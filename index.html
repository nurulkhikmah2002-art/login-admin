<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Scanner - LPK Takashi Japan</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #bc002d; /* Merah Jepang */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h2 {
            color: #bc002d;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitle {
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #eee !important;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Selamat Datang</h2>
    <p style="font-weight: bold; color: #bc002d; margin-top: 0;">LPK TAKASHI JAPAN</p>
    <div class="subtitle">Pastikan QR Code terlihat jelas di kamera</div>
    
    <div id="reader"></div>

    <div id="result"></div>
</div>

<script>
    // Konfigurasi Scanner
    function onScanSuccess(decodedText, decodedResult) {
        // Tampilkan hasil di layar
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.className = 'success';
        resultDiv.innerHTML = `Terdeteksi: ${decodedText}`;

        // Kirim data ke Google Apps Script (Opsional)
        // kirimDataKeSheets(decodedText);
        
        console.log(`Code scanned = ${decodedText}`, decodedResult);
        
        // Berhenti scan sejenak agar tidak double input
        html5QrcodeScanner.clear();
        setTimeout(() => {
            location.reload(); // Refresh untuk scan berikutnya
        }, 3000);
    }

    function onScanFailure(error) {
        // Log ini dimatikan agar tidak memenuhi console
        // console.warn(`Code scan error = ${error}`);
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
            fps: 10, 
            qrbox: {width: 250, height: 250},
            aspectRatio: 1.0 
        },
        /* verbose= */ false);
    
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>

</body>
</html>
